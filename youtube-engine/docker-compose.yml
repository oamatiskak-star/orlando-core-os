version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  youtube-engine:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PLAYWRIGHT_HEADLESS=true
    volumes:
      - upload_files:/app/uploads
      - logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('ioredis'); process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  competitor-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - COMPETITOR_WORKER_NAME=competitor-surveillance-yt
      - COMPETITOR_PLATFORM=youtube
    volumes:
      - logs:/app/logs
    command: ["node", "dist/competitor-scanner/index.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  upload_files:
  logs:
