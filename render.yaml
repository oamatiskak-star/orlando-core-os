services:
  - type: worker
    name: orlando-youtube-engine
    runtime: node
    rootDir: youtube-engine
    buildCommand: npm install --include=dev && npx playwright install chromium && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: orlando-redis
          property: connectionString
      - key: YOUTUBE_OAUTH_CLIENT_ID
        sync: false
      - key: YOUTUBE_OAUTH_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_OAUTH_REDIRECT_URI
        value: https://dashboard.strkbeheer.nl/api/youtube/oauth/callback
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: UPLOAD_WORKER_CONCURRENCY
        value: "2"
      - key: VERIFICATION_INTERVAL_MS
        value: "30000"
      - key: MAX_UPLOAD_RETRIES
        value: "5"
      - key: LOG_TO_FILE
        value: "false"
      - key: LOG_LEVEL
        value: "info"
      - key: VIDEO_OUTPUT_DIR
        value: "/tmp/orlando-videos"

  - type: worker
    name: orlando-executor
    runtime: node
    rootDir: planning-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MACHINE_ID
        value: render-cli-r
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-mail-engine
    runtime: node
    rootDir: mail-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3003"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: MONEYBIRD_API_TOKEN
        sync: false
      - key: MONEYBIRD_ADMINISTRATION_ID
        sync: false
      - key: LOG_LEVEL
        value: "info"

  - type: worker
    name: orlando-competitor-scanner
    runtime: node
    rootDir: youtube-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/competitor-scanner/index.js
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: YOUTUBE_DATA_API_KEY
        sync: false
      - key: COMPETITOR_WORKER_NAME
        value: competitor-surveillance-yt
      - key: COMPETITOR_PLATFORM
        value: youtube
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-executive-engine
    runtime: node
    rootDir: executive-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3004"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_TIMEZONE
        value: Europe/Amsterdam
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-acquisition-engine
    runtime: node
    rootDir: acquisition-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3005"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_TIMEZONE
        value: Europe/Amsterdam
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-watchdog
    runtime: node
    rootDir: watchdog-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3006"
      - key: CHECK_INTERVAL_MS
        value: "60000"
      - key: MAX_RECOVERY_ATTEMPTS
        value: "2"
      - key: RENDER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WATCHDOG_DENYLIST
        value: ""
      - key: WATCHDOG_ORG_CHECKS_ENABLED
        value: "true"
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-checkout-auditor
    runtime: node
    rootDir: checkout-auditor
    buildCommand: npm install --include=dev && npx playwright install chromium chromium-headless-shell && npm run build
    startCommand: node dist/index.js
    plan: standard
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3008"
      - key: LOG_LEVEL
        value: "info"
      # Browsers in node_modules/.cache (cached) ipv ~/.cache/ms-playwright (NOT cached between Render builds)
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: AQUIER_BASE_URL
        value: "https://aquier.com"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: "checkout-audit-artifacts"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL_PRIMARY
        value: "claude-opus-4-7"
      - key: ANTHROPIC_MODEL_BATCH
        value: "claude-sonnet-4-6"
      - key: STRIPE_RESTRICTED_KEY_TEST
        sync: false
      # Required when aquier.com runs LIVE Stripe (cs_live_* sessions).
      # Read-only restricted key — zelfde permissions als TEST maar op live Stripe account.
      - key: STRIPE_RESTRICTED_KEY_LIVE
        sync: false
      # Phase 2 — pre-auth flow. Both must be set together. Leave unset for anonymous-only audits.
      - key: TEST_USER_EMAIL
        sync: false
      - key: TEST_USER_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CHECKOUT_AUDITOR_MAX_SCENARIOS_PER_RUN
        value: "20"
      - key: BROWSER_CONCURRENCY
        value: "3"
      - key: SKIP_WEBKIT_DEVICES
        value: "true"
      - key: SCENARIO_TIMEOUT_MS
        value: "180000"
      - key: WEBHOOK_WAIT_MAX_MS
        value: "60000"
      - key: AUDIT_RETENTION_DAYS
        value: "14"
      - key: RUN_TRIGGER_SECRET
        sync: false
      - key: AGENT_TIMEZONE
        value: "Europe/Amsterdam"

  # Content-worker — NL/USA viral Shorts generatie (un-gate-route voor AQUIER_ATTENTION_DOMINATION_ENGINE).
  # Docker-runtime want hij heeft ffmpeg nodig (zie content-worker/Dockerfile) — node-buildCommand mist die binary.
  # autoDeploy: false — service staat klaar in de blueprint maar draait NIET vanzelf. Deploy + keys handmatig
  # zetten zodra de NL-content-pijler un-gated wordt (ANTHROPIC_API_KEY is forward-looking; huidige code gebruikt
  # Pexels/ffmpeg, script-generatie via Anthropic komt bij de un-gate-taak).
  - type: worker
    name: orlando-content-worker
    runtime: docker
    dockerfilePath: content-worker/Dockerfile
    dockerContext: content-worker
    plan: starter
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER_BUCKET
        sync: false
      - key: CONTENT_WORKER_CRON
        value: "*/15 * * * *"
      - key: VIDEO_OUTPUT_DIR
        value: "/tmp/orlando-videos"
      - key: LOG_LEVEL
        value: "info"

  - type: redis
    name: orlando-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []
