services:
  - type: worker
    name: orlando-youtube-engine
    runtime: node
    rootDir: youtube-engine
    buildCommand: npm install --include=dev && npx playwright install chromium && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: orlando-redis
          property: connectionString
      - key: YOUTUBE_OAUTH_CLIENT_ID
        sync: false
      - key: YOUTUBE_OAUTH_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_OAUTH_REDIRECT_URI
        value: https://dashboard.strkbeheer.nl/api/youtube/oauth/callback
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: UPLOAD_WORKER_CONCURRENCY
        value: "2"
      - key: VERIFICATION_INTERVAL_MS
        value: "30000"
      - key: MAX_UPLOAD_RETRIES
        value: "5"
      - key: LOG_TO_FILE
        value: "false"
      - key: LOG_LEVEL
        value: "info"
      - key: VIDEO_OUTPUT_DIR
        value: "/tmp/orlando-videos"

  - type: worker
    name: orlando-executor
    runtime: node
    rootDir: planning-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MACHINE_ID
        value: render-cli-r
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-mail-engine
    runtime: node
    rootDir: mail-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3003"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: MONEYBIRD_API_TOKEN
        sync: false
      - key: MONEYBIRD_ADMINISTRATION_ID
        sync: false
      - key: LOG_LEVEL
        value: "info"

  - type: worker
    name: orlando-competitor-scanner
    runtime: node
    rootDir: youtube-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/competitor-scanner/index.js
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: YOUTUBE_DATA_API_KEY
        sync: false
      - key: COMPETITOR_WORKER_NAME
        value: competitor-surveillance-yt
      - key: COMPETITOR_PLATFORM
        value: youtube
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-executive-engine
    runtime: node
    rootDir: executive-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3004"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_TIMEZONE
        value: Europe/Amsterdam
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-acquisition-engine
    runtime: node
    rootDir: acquisition-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3005"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENT_TIMEZONE
        value: Europe/Amsterdam
      - key: LOG_LEVEL
        value: "info"

  - type: web
    name: orlando-watchdog
    runtime: node
    rootDir: watchdog-engine
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3006"
      - key: CHECK_INTERVAL_MS
        value: "60000"
      - key: MAX_RECOVERY_ATTEMPTS
        value: "2"
      - key: RENDER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WATCHDOG_DENYLIST
        value: ""
      - key: LOG_LEVEL
        value: "info"

  - type: redis
    name: orlando-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []
